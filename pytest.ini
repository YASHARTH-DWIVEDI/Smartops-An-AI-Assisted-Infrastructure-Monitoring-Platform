[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --no-header
    -p no:warnings

# Environment override so tests always use in-memory SQLite
env =
    DATABASE_URL=sqlite:///:memory:
    AI_PROVIDER=rule_based
    LOG_LEVEL=WARNING
    AGENT_API_URL=http://localhost:8000
